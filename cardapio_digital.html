<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Açaí-se | Cardápio Digital</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --verde-escuro:#5c2d8a;
    --verde:#8b52b8;
    --verde-claro:#8b52b8;
    --verde-suave:#F2EBF8;
    --creme:#FAF8FB;
    --creme-card:#FFFFFF;
    --roxo-acai:#080507;
    --texto:#1a1418;
    --texto-suave:#756a7d;
    --linha:#E9E1EF;
    --alerta:#C0392B;
    --font-display: 'Georgia', 'Playfair Display', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family: var(--font-body);
    background: var(--creme);
    color: var(--texto);
    -webkit-font-smoothing: antialiased;
    padding-bottom: 90px;
  }
  /* ---------- TELA DE SELEÇÃO DE LOJA ---------- */
  #tela-loja{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 32px 20px;
    background: linear-gradient(180deg, var(--verde-escuro) 0%, var(--verde) 55%, var(--creme) 55%);
  }
  .marca{
    text-align:center;
    color:#fff;
    margin-bottom: 28px;
  }
  .marca .logo-marca{
    height: 110px;
    width: auto;
    margin: 0 auto 14px;
    display:block;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.25));
  }
  .marca p{
    font-size: 13px;
    opacity: 0.85;
    margin-top: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .card-selecao{
    background: var(--creme-card);
    border-radius: 18px;
    width: 100%;
    max-width: 420px;
    padding: 22px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
  }
  .card-selecao h2{
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .card-selecao .sub{
    font-size: 12.5px;
    color: var(--texto-suave);
    margin-bottom: 16px;
  }
  .lista-lojas{
    display:flex;
    flex-direction: column;
    gap: 10px;
  }
  .opcao-loja{
    display:flex;
    align-items:center;
    justify-content: space-between;
    border: 1.5px solid var(--linha);
    border-radius: 12px;
    padding: 13px 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .opcao-loja:hover{ border-color: var(--verde); background: var(--verde-suave); }
  .opcao-loja.selecionada{ border-color: var(--verde); background: var(--verde-suave); }
  .opcao-loja.fechada{ opacity: 0.55; cursor: not-allowed; background: #F3F1F5; }
  .opcao-loja.fechada:hover{ border-color: var(--linha); background: #F3F1F5; }
  .texto-fechado{ color: var(--alerta) !important; font-weight:600; }
  .opcao-loja .nome-loja{ font-weight: 600; font-size: 14px; }
  .opcao-loja .endereco-loja{ font-size: 12px; color: var(--texto-suave); margin-top: 2px; }
  .opcao-loja .check{
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--linha);
    flex-shrink: 0;
    display:flex; align-items:center; justify-content:center;
  }
  .opcao-loja.selecionada .check{ border-color: var(--verde); background: var(--verde); color:#fff; font-size: 12px;}
  .btn-primario{
    width:100%;
    background: var(--verde);
    color:#fff;
    border:none;
    border-radius: 12px;
    padding: 14px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 18px;
    transition: background .15s, opacity .15s;
  }
  .btn-primario:disabled{ opacity: 0.4; cursor: not-allowed; }
  .btn-primario:not(:disabled):hover{ background: var(--verde-escuro); }
  .aviso-sem-delivery{
    font-size: 11.5px;
    color: var(--texto-suave);
    margin-top: 14px;
    text-align: center;
    line-height: 1.5;
  }

  /* ---------- APP PRINCIPAL ---------- */
  #app{ display:none; }
  header.topo{
    background: var(--verde);
    color: #fff;
    padding: 16px 18px 40px;
    position: relative;
  }
  header.topo .linha-topo{
    display:flex;
    align-items:center;
    justify-content: space-between;
  }
  header.topo .loja-atual{
    display:flex; align-items:center; gap:10px;
  }
  header.topo .loja-atual .selo-mini{
    height:34px; width:auto;
    background: #fff;
    border-radius: 8px;
    padding: 3px 5px;
    flex-shrink:0;
  }
  header.topo .loja-atual .nome{ font-size: 14px; font-weight:700; }
  header.topo .loja-atual .status{ font-size: 11px; opacity:0.85; }
  header.topo .status::before{
    content:''; display:inline-block; width:6px; height:6px; border-radius:50%;
    background:#7ED957; margin-right:5px;
  }
  header.topo button.trocar{
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color:#fff;
    font-size: 11.5px;
    padding: 7px 12px;
    border-radius: 20px;
    cursor:pointer;
  }
  header.topo button.trocar:hover{ background: rgba(255,255,255,0.25); }

  .abas-categoria{
    display:flex;
    gap: 8px;
    overflow-x:auto;
    padding: 14px 18px 0;
    background: var(--creme);
    position: sticky;
    top:0;
    z-index: 20;
    border-bottom: 1px solid var(--linha);
    margin-top: -22px;
    border-radius: 18px 18px 0 0;
    scrollbar-width: none;
  }
  .abas-categoria::-webkit-scrollbar{ display:none; }
  .aba{
    flex-shrink:0;
    padding: 9px 16px 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--texto-suave);
    cursor:pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
  }
  .aba.ativa{
    color: var(--verde-escuro);
    border-bottom-color: var(--verde);
  }

  main{ padding: 16px 18px 20px; max-width: 640px; margin: 0 auto; }
  .secao-categoria{ margin-bottom: 26px; }
  .secao-categoria h3{
    font-family: var(--font-display);
    font-size: 18px;
    margin-bottom: 12px;
    color: var(--verde-escuro);
  }
  .grid-produtos{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .card-produto{
    display:flex;
    flex-direction: column;
    background: var(--creme-card);
    border: 1px solid var(--linha);
    border-radius: 14px;
    overflow: hidden;
    cursor:pointer;
    transition: box-shadow .15s, transform .1s;
  }
  .card-produto:hover{ box-shadow: 0 4px 14px rgba(0,0,0,0.06); }
  .card-produto:active{ transform: scale(0.99); }
  .thumb-produto{
    width: 100%;
    aspect-ratio: 1 / 1;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size: 44px;
    overflow: hidden;
  }
  .thumb-produto img, .thumb-modal img, .thumb-mini img{
    width:100%; height:100%; object-fit:cover; border-radius:inherit;
  }
  .info-produto{ flex:1; min-width:0; display:flex; flex-direction:column; justify-content:flex-start; padding: 10px 12px 12px; }
  .info-produto .nome{ font-size: 13.5px; font-weight: 700; margin-bottom: 3px; line-height:1.3; }
  .info-produto .desc{ font-size: 11.5px; color: var(--texto-suave); line-height:1.4; margin-bottom: 7px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .info-produto .preco{ font-size: 13.5px; font-weight: 700; color: var(--verde-escuro); margin-top:auto; }
  .info-produto .preco .a-partir{ font-size:10.5px; font-weight:500; color:var(--texto-suave); text-transform:uppercase; margin-right:3px;}
  .info-produto .preco .preco-riscado{ font-size:11.5px; font-weight:500; color:var(--texto-suave); text-decoration:line-through; margin-right:5px;}

  @media (max-width: 380px){
    .grid-produtos{ grid-template-columns: 1fr 1fr; gap: 9px; }
    .info-produto{ padding: 8px 9px 10px; }
  }

  /* ---------- MODAL DE PERSONALIZAÇÃO ---------- */
  .overlay{
    display:none;
    position: fixed; inset:0;
    background: rgba(20,20,15,0.5);
    z-index: 50;
    align-items:flex-end;
    justify-content:center;
  }
  .overlay.aberto{ display:flex; }
  .modal{
    background: var(--creme-card);
    width:100%; max-width: 480px;
    max-height: 88vh;
    border-radius: 20px 20px 0 0;
    display:flex; flex-direction:column;
    animation: subir .25s ease-out;
  }
  @keyframes subir{ from{ transform: translateY(30px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .modal-topo{
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--linha);
    position: relative;
  }
  .modal-topo .fechar{
    position:absolute; top:14px; right:14px;
    width:28px; height:28px;
    border-radius:50%;
    background: var(--verde-suave);
    border:none;
    font-size: 14px;
    cursor:pointer;
    color: var(--verde-escuro);
  }
  .modal-topo .thumb-modal{
    width:52px; height:52px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; margin-bottom:10px;
  }
  .modal-topo h3{ font-size:17px; margin-bottom:4px; }
  .modal-topo p{ font-size:12.5px; color:var(--texto-suave); line-height:1.5; }

  .modal-corpo{ overflow-y:auto; padding: 4px 18px 18px; flex:1; }
  .grupo-opcao{ padding: 16px 0; border-bottom: 1px solid var(--linha); }
  .grupo-opcao:last-child{ border-bottom:none; }
  .grupo-opcao .cabecalho-grupo{
    display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 10px;
  }
  .grupo-opcao .cabecalho-grupo .titulo-grupo{ font-size: 14px; font-weight:700; }
  .grupo-opcao .cabecalho-grupo .tag-obrig{
    font-size: 10px; font-weight:700; color: var(--alerta);
    background: rgba(192,57,43,0.08);
    padding: 2px 7px; border-radius: 6px;
    text-transform: uppercase;
  }
  .grupo-opcao .cabecalho-grupo .tag-opcional{
    font-size: 10px; font-weight:600; color: var(--texto-suave);
    text-transform: uppercase;
  }
  .linha-escolha{
    display:flex; align-items:center; justify-content:space-between;
    padding: 9px 0;
    cursor:pointer;
  }
  .linha-escolha .esq{ display:flex; align-items:center; gap:10px; }
  .linha-escolha .marcador{
    width:19px; height:19px;
    border: 2px solid var(--linha);
    flex-shrink:0;
  }
  .linha-escolha .marcador.radio{ border-radius:50%; }
  .linha-escolha .marcador.checkbox{ border-radius: 5px; }
  .linha-escolha.marcado .marcador{ border-color: var(--verde); background: var(--verde); position:relative;}
  .linha-escolha.marcado .marcador.radio::after{
    content:''; position:absolute; inset:4px; border-radius:50%; background:#fff;
  }
  .linha-escolha.marcado .marcador.checkbox::after{
    content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px;
  }
  .linha-escolha .label-escolha{ font-size: 13.5px; }
  .linha-escolha.travado{ opacity: 0.35; cursor: not-allowed; }
  .linha-escolha .preco-extra{ font-size: 12.5px; color: var(--texto-suave); font-weight:600; }

  .stepper{ display:flex; align-items:center; gap:14px; justify-content:center; padding: 14px 0 4px; }
  .stepper button{
    width: 32px; height:32px; border-radius:50%;
    border: 1.5px solid var(--verde);
    background:#fff; color: var(--verde);
    font-size: 16px; font-weight:700;
    cursor:pointer;
  }
  .stepper button:disabled{ opacity:0.35; cursor:not-allowed; }
  .stepper .qtd{ font-size: 15px; font-weight:700; min-width: 20px; text-align:center; }

  .modal-rodape{ padding: 14px 18px 20px; border-top:1px solid var(--linha); }
  .btn-adicionar{
    width:100%;
    background: var(--verde);
    color:#fff; border:none;
    border-radius: 12px;
    padding: 14px;
    font-size:14px; font-weight:700;
    cursor:pointer;
    display:flex; align-items:center; justify-content:space-between;
    padding-left: 18px; padding-right: 18px;
  }
  .btn-adicionar:hover{ background: var(--verde-escuro); }

  /* ---------- BARRA DE CARRINHO ---------- */
  .barra-carrinho{
    position: fixed; left:0; right:0; bottom:0;
    display:none;
    justify-content:center;
    padding: 12px 18px calc(12px + env(safe-area-inset-bottom));
    z-index: 40;
  }
  .barra-carrinho.visivel{ display:flex; }
  .barra-carrinho .conteudo{
    width:100%; max-width: 480px;
    background: var(--verde-escuro);
    color:#fff;
    border-radius: 14px;
    padding: 13px 16px;
    display:flex; align-items:center; justify-content:space-between;
    cursor:pointer;
    box-shadow: 0 8px 22px rgba(0,0,0,0.22);
  }
  .barra-carrinho .esq{ display:flex; align-items:center; gap:10px; }
  .barra-carrinho .bolha{
    background:#fff; color: var(--verde-escuro);
    width:24px; height:24px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 12px; font-weight:800;
  }
  .barra-carrinho .texto{ font-size:13.5px; font-weight:700; }
  .barra-carrinho .valor{ font-size:14px; font-weight:800; }

  /* ---------- MODAL CARRINHO ---------- */
  .modal-carrinho .item-carrinho{
    display:flex; gap:10px; padding: 12px 0; border-bottom: 1px solid var(--linha);
  }
  .modal-carrinho .item-carrinho .thumb-mini{
    width:44px; height:44px; border-radius:8px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:20px;
  }
  .modal-carrinho .item-carrinho .info-item{ flex:1; min-width:0; }
  .modal-carrinho .item-carrinho .info-item .nome-item{ font-size:13px; font-weight:700; margin-bottom:2px; }
  .modal-carrinho .item-carrinho .info-item .opcoes-item{ font-size:11px; color:var(--texto-suave); line-height:1.4; }
  .modal-carrinho .item-carrinho .direita-item{ display:flex; flex-direction:column; align-items:flex-end; justify-content:space-between; }
  .modal-carrinho .item-carrinho .preco-item{ font-size:13px; font-weight:700; }
  .mini-stepper{ display:flex; align-items:center; gap:8px; }
  .mini-stepper button{
    width:22px; height:22px; border-radius:50%; border:1.5px solid var(--linha); background:#fff;
    font-size:12px; cursor:pointer; color: var(--verde-escuro);
  }
  .mini-stepper button.remover{ border-color: var(--alerta); color: var(--alerta); }
  .mini-stepper .qtd-mini{ font-size:12.5px; font-weight:700; }

  .resumo-total{ padding: 14px 0 4px; }
  .linha-total{ display:flex; justify-content:space-between; font-size:13px; color:var(--texto-suave); margin-bottom:6px; }
  .linha-total.final{ font-size:15px; font-weight:800; color:var(--texto); margin-top:8px; }
  .obs-pedido{
    width:100%; border:1.5px solid var(--linha); border-radius:10px; padding:10px 12px;
    font-size:12.5px; font-family:inherit; resize:none; margin-top:10px;
  }
  .dados-entrega{ margin: 6px 0 4px; padding: 14px 0; border-top: 1px solid var(--linha); border-bottom: 1px solid var(--linha); }
  .campo-entrega{ margin-bottom: 12px; }
  .campo-entrega:last-child{ margin-bottom: 0; }
  .campo-entrega label{ font-size:11.5px; font-weight:700; color:var(--texto-suave); text-transform:uppercase; display:block; margin-bottom:5px; }
  .campo-entrega input, .campo-entrega select, .campo-entrega textarea{
    width:100%; padding:9px 11px; border:1.5px solid var(--linha); border-radius:9px;
    font-size:13.5px; font-family:inherit; resize:none;
  }
  .campo-entrega input:focus, .campo-entrega select:focus, .campo-entrega textarea:focus{ outline:none; border-color:var(--verde); }
  .erro-dados-entrega{ font-size:12px; color:var(--alerta); font-weight:600; margin-top:8px; }
  .seletor-tipo-entrega{ display:flex; gap:8px; }
  .opcao-tipo-entrega{
    flex:1; text-align:center; padding:10px 8px; border:1.5px solid var(--linha); border-radius:10px;
    font-size:13px; font-weight:600; cursor:pointer; color:var(--texto-suave); transition: border-color .15s, background .15s;
  }
  .opcao-tipo-entrega.ativa{ border-color:var(--verde); background:var(--verde-suave); color:var(--verde-escuro); }
  .carrinho-vazio{ text-align:center; padding: 40px 10px; color: var(--texto-suave); }
  .carrinho-vazio .icone-vazio{ font-size:38px; margin-bottom:10px; }
  .carrinho-vazio p{ font-size:13px; }

  @media (min-width: 480px){
    .barra-carrinho{ padding-bottom:18px; }
  }
</style>
</head>

<script>
/* =========================================================
   CONFIGURAÇÃO SUPABASE
   ========================================================= */
const SUPABASE_URL = 'https://gltnusallwwgprjgurls.supabase.co';
const SUPABASE_KEY = 'sb_publishable_SKr_q0eOgjLpb3sYsYndOg_XvEzCSep';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================================================
   DADOS — carregados do Supabase (ver painel de admin)
   ========================================================= */
let LOJAS = [];
let CATEGORIAS = [];
let PRODUTOS = [];

async function carregarDadosDoSupabase(){
  const resLojas = await sb.from('lojas').select('*').eq('ativo', true).order('nome');
  const lojasBrutas = resLojas.data || [];
  const idsLojas = lojasBrutas.map(l => l.id);

  const [resHorarios, resCategorias, resProdutos] = await Promise.all([
    idsLojas.length > 0 ? sb.from('horarios_loja').select('*').in('loja_id', idsLojas) : Promise.resolve({ data: [] }),
    sb.from('categorias').select('*').order('ordem'),
    sb.from('produtos').select('*, grupos_opcoes(*, opcoes(*))').eq('ativo', true).order('ordem'),
  ]);

  const horarios = resHorarios.data || [];
  const agora = new Date();
  const diaSemanaHoje = agora.getDay();
  const horaAgora = String(agora.getHours()).padStart(2,'0') + ':' + String(agora.getMinutes()).padStart(2,'0');

  LOJAS = lojasBrutas.map(l => {
    const horarioHoje = horarios.find(h => h.loja_id === l.id && h.dia_semana === diaSemanaHoje);
    let aberta = true;
    let textoHorario = '';
    if(horarioHoje){
      if(horarioHoje.fechado){
        aberta = false;
        textoHorario = 'Fechada hoje';
      } else if(horarioHoje.abre && horarioHoje.fecha){
        const abre = horarioHoje.abre.substring(0,5);
        const fecha = horarioHoje.fecha.substring(0,5);
        aberta = horaAgora >= abre && horaAgora <= fecha;
        textoHorario = aberta ? `Aberta até ${fecha}` : `Fechada agora · abre ${abre}`;
      }
    }
    return { id: l.id, nome: l.nome, endereco: '', telefone: l.whatsapp, aberta, textoHorario, linkExterno: l.link_externo || null };
  });

  CATEGORIAS = (resCategorias.data || []);

  PRODUTOS = (resProdutos.data || []).map(p => ({
    id: p.id,
    categoria: p.categoria_id,
    nome: p.nome,
    desc: p.descricao || '',
    icone: p.icone || '🍇',
    fotoUrl: p.foto_url || '',
    precoBase: Number(p.preco_base),
    precoPromocional: p.preco_promocional != null ? Number(p.preco_promocional) : null,
    grupos: (p.grupos_opcoes || []).map(g => ({
      id: g.id, titulo: g.titulo, tipo: g.tipo, obrigatorio: g.obrigatorio,
      qtdMin: g.qtd_min || 0, qtdMax: g.qtd_max,
      opcoes: (g.opcoes || []).map(o => ({ id: o.id, label: o.label, delta: Number(o.delta_preco) })),
    })),
  }));
}

/* =========================================================
   ESTADO
   ========================================================= */
let lojaSelecionada = null;
let categoriaAtiva = null;
let carrinho = []; // { chaveId, produtoId, nome, icone, qtd, precoUnit, resumoOpcoes }
let dadosEntrega = { tipoEntrega: 'delivery', nome: '', telefone: '', endereco: '', pagamento: '', observacao: '' };
let erroDadosEntrega = '';
let produtoEmEdicao = null;
let escolhasAtuais = {};
let qtdAtual = 1;

/* =========================================================
   TELA DE LOJA
   ========================================================= */
function montarListaLojas(){
  const lista = document.getElementById('lista-lojas');
  if(LOJAS.length === 0){
    lista.innerHTML = '<p style="font-size:12.5px; color:var(--texto-suave); text-align:center; padding:20px 0;">Nenhuma loja com delivery ativo no momento.</p>';
    return;
  }
  lista.innerHTML = LOJAS.map(loja => `
    <div class="opcao-loja ${loja.aberta === false ? 'fechada' : ''}" data-id="${loja.id}" onclick="${loja.aberta === false ? '' : `selecionarLoja('${loja.id}')`}">
      <div>
        <div class="nome-loja">${loja.nome}</div>
        ${loja.linkExterno ? `<div class="endereco-loja">↗ Pedido pelo site próprio da loja</div>` : ''}
        ${loja.textoHorario ? `<div class="endereco-loja ${loja.aberta === false ? 'texto-fechado' : ''}">${loja.textoHorario}</div>` : ''}
      </div>
      <div class="check"></div>
    </div>
  `).join('');
}

function selecionarLoja(id){
  lojaSelecionada = LOJAS.find(l => l.id === id);
  document.querySelectorAll('.opcao-loja').forEach(el => {
    el.classList.toggle('selecionada', el.dataset.id === id);
    el.querySelector('.check').innerHTML = el.dataset.id === id ? '✓' : '';
  });
  const btn = document.getElementById('btn-confirmar-loja');
  btn.disabled = false;
  btn.textContent = lojaSelecionada.linkExterno ? 'Ir para o cardápio ↗' : 'Ver cardápio';
}

function entrarNoCardapio(){
  if(!lojaSelecionada) return;
  if(lojaSelecionada.linkExterno){
    window.location.href = lojaSelecionada.linkExterno;
    return;
  }
  document.getElementById('tela-loja').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('nome-loja-topo').textContent = lojaSelecionada.nome;
  montarAbas();
  montarCardapio();
}

document.getElementById('btn-confirmar-loja').addEventListener('click', entrarNoCardapio);

document.getElementById('btn-trocar-loja').addEventListener('click', () => {
  carrinho = [];
  atualizarBarraCarrinho();
  document.getElementById('app').style.display = 'none';
  document.getElementById('tela-loja').style.display = 'flex';
});

/* =========================================================
   CARDÁPIO
   ========================================================= */
function montarAbas(){
  const nav = document.getElementById('abas-categoria');
  nav.innerHTML = CATEGORIAS.map(c => `
    <div class="aba ${c.id === categoriaAtiva ? 'ativa' : ''}" data-id="${c.id}" onclick="irParaCategoria('${c.id}')">${c.nome}</div>
  `).join('');
}

function irParaCategoria(id){
  categoriaAtiva = id;
  document.querySelectorAll('.aba').forEach(el => el.classList.toggle('ativa', el.dataset.id === id));
  const alvo = document.getElementById('secao-' + id);
  if(alvo) alvo.scrollIntoView({behavior:'smooth', block:'start'});
}

function montarCardapio(){
  const cont = document.getElementById('conteudo-cardapio');
  cont.innerHTML = CATEGORIAS.map(cat => {
    const produtos = PRODUTOS.filter(p => p.categoria === cat.id);
    if(produtos.length === 0) return '';
    return `
      <section class="secao-categoria" id="secao-${cat.id}">
        <h3>${cat.nome}</h3>
        <div class="grid-produtos">
          ${produtos.map(p => `
            <div class="card-produto" onclick="abrirProduto('${p.id}')">
              <div class="thumb-produto" style="background:${corFundoIcone(p.categoria)}">${p.fotoUrl ? `<img src="${p.fotoUrl}" alt="${p.nome}">` : p.icone}</div>
              <div class="info-produto">
                <div class="nome">${p.nome}</div>
                <div class="desc">${p.desc}</div>
                <div class="preco">
                  ${(() => {
                    const { preco, temVariacao } = calcularPrecoMinimo(p);
                    if(p.precoPromocional != null){
                      return `<span class="preco-riscado">R$ ${p.precoBase.toFixed(2).replace('.',',')}</span> R$ ${preco.toFixed(2).replace('.',',')}`;
                    }
                    return `${temVariacao ? '<span class="a-partir">a partir de</span>' : ''}R$ ${preco.toFixed(2).replace('.',',')}`;
                  })()}
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </section>
    `;
  }).join('');
}

function calcularPrecoMinimo(p){
  let preco = p.precoPromocional != null ? p.precoPromocional : p.precoBase;
  let temVariacao = false;
  p.grupos.forEach(g => {
    if(g.opcoes.length === 0) return;
    if(g.tipo === 'radio'){
      const deltas = g.opcoes.map(o => o.delta);
      preco += Math.min(...deltas);
      if(new Set(deltas).size > 1) temVariacao = true;
    } else {
      const min = g.qtdMin || 0;
      const deltasOrdenados = [...g.opcoes.map(o => o.delta)].sort((a,b) => a-b);
      for(let i=0;i<min;i++){ preco += deltasOrdenados[i] || 0; }
      if(g.opcoes.some(o => o.delta !== 0)) temVariacao = true;
    }
  });
  return { preco, temVariacao };
}

function corFundoIcone(categoria){
  const cores = { acai:'#EFE2F2', smoothies:'#FDE9E4', salgados:'#EAF1E6', combos:'#FFF3D6' };
  return cores[categoria] || '#EEE';
}

/* =========================================================
   MODAL DE PRODUTO
   ========================================================= */
function abrirProduto(id){
  produtoEmEdicao = PRODUTOS.find(p => p.id === id);
  escolhasAtuais = {};
  qtdAtual = 1;
  produtoEmEdicao.grupos.forEach(g => {
    escolhasAtuais[g.id] = g.tipo === 'radio' ? null : [];
  });
  renderizarModalProduto();
  document.getElementById('overlay-produto').classList.add('aberto');
}

function fecharModalProduto(){
  document.getElementById('overlay-produto').classList.remove('aberto');
}

function calcularPrecoUnitario(){
  let preco = produtoEmEdicao.precoPromocional != null ? produtoEmEdicao.precoPromocional : produtoEmEdicao.precoBase;
  produtoEmEdicao.grupos.forEach(g => {
    if(g.tipo === 'radio'){
      const escolhida = g.opcoes.find(o => o.id === escolhasAtuais[g.id]);
      if(escolhida) preco += escolhida.delta;
    } else {
      (escolhasAtuais[g.id] || []).forEach(oid => {
        const op = g.opcoes.find(o => o.id === oid);
        if(op) preco += op.delta;
      });
    }
  });
  return preco;
}

function grupoValido(g){
  if(g.tipo === 'radio') return !g.obrigatorio || !!escolhasAtuais[g.id];
  const qtd = (escolhasAtuais[g.id] || []).length;
  const min = g.qtdMin || 0;
  const max = g.qtdMax;
  if(qtd < min) return false;
  if(max != null && qtd > max) return false;
  return true;
}

function formularioCompleto(){
  return produtoEmEdicao.grupos.every(grupoValido);
}

function renderizarModalProduto(){
  const p = produtoEmEdicao;
  const precoUnit = calcularPrecoUnitario();
  const totalLinha = precoUnit * qtdAtual;

  document.getElementById('modal-produto').innerHTML = `
    <div class="modal-topo">
      <button class="fechar" onclick="fecharModalProduto()">✕</button>
      <div class="thumb-modal" style="background:${corFundoIcone(p.categoria)}">${p.fotoUrl ? `<img src="${p.fotoUrl}" alt="${p.nome}">` : p.icone}</div>
      <h3>${p.nome}</h3>
      <p>${p.desc}</p>
    </div>
    <div class="modal-corpo">
      ${p.grupos.map(g => {
        const qtdSelecionada = (escolhasAtuais[g.id] || []).length;
        const noMaximo = g.tipo === 'checkbox' && g.qtdMax != null && qtdSelecionada >= g.qtdMax;
        let dicaQtd = '';
        if(g.tipo === 'checkbox'){
          if(g.qtdMin > 0 && g.qtdMax != null) dicaQtd = g.qtdMin === g.qtdMax ? `escolha ${g.qtdMin}` : `escolha de ${g.qtdMin} a ${g.qtdMax}`;
          else if(g.qtdMax != null) dicaQtd = `escolha até ${g.qtdMax}`;
          else if(g.qtdMin > 0) dicaQtd = `escolha ao menos ${g.qtdMin}`;
        }
        return `
        <div class="grupo-opcao">
          <div class="cabecalho-grupo">
            <div class="titulo-grupo">${g.titulo}</div>
            <div class="${g.obrigatorio ? 'tag-obrig' : 'tag-opcional'}">${dicaQtd || (g.obrigatorio ? 'obrigatório' : 'opcional')}</div>
          </div>
          ${g.opcoes.map(o => {
            const marcado = g.tipo === 'radio' ? escolhasAtuais[g.id] === o.id : (escolhasAtuais[g.id]||[]).includes(o.id);
            const travado = noMaximo && !marcado;
            return `
              <div class="linha-escolha ${marcado ? 'marcado' : ''} ${travado ? 'travado' : ''}" onclick="${travado ? '' : `marcarOpcao('${g.id}','${o.id}','${g.tipo}')`}">
                <div class="esq">
                  <div class="marcador ${g.tipo}"></div>
                  <div class="label-escolha">${o.label}</div>
                </div>
                <div class="preco-extra">${o.delta === 0 ? '' : (o.delta > 0 ? '+ ' : '- ') + 'R$ ' + Math.abs(o.delta).toFixed(2).replace('.',',')}</div>
              </div>
            `;
          }).join('')}
        </div>
      `;}).join('')}
      <div class="stepper">
        <button onclick="alterarQtd(-1)" ${qtdAtual<=1 ? 'disabled' : ''}>–</button>
        <div class="qtd">${qtdAtual}</div>
        <button onclick="alterarQtd(1)">+</button>
      </div>
    </div>
    <div class="modal-rodape">
      <button class="btn-adicionar" ${formularioCompleto() ? '' : 'disabled style="opacity:0.45;cursor:not-allowed;"'} onclick="adicionarAoCarrinho()">
        <span>${formularioCompleto() ? 'Adicionar' : 'Escolha as opções obrigatórias'}</span>
        <span>R$ ${totalLinha.toFixed(2).replace('.',',')}</span>
      </button>
    </div>
  `;
}

function marcarOpcao(grupoId, opcaoId, tipo){
  if(tipo === 'radio'){
    escolhasAtuais[grupoId] = opcaoId;
  } else {
    const grupo = produtoEmEdicao.grupos.find(g => g.id === grupoId);
    const arr = escolhasAtuais[grupoId] || [];
    const idx = arr.indexOf(opcaoId);
    if(idx >= 0){
      arr.splice(idx,1);
    } else {
      if(grupo.qtdMax != null && arr.length >= grupo.qtdMax) return; // já atingiu o máximo, ignora o clique
      arr.push(opcaoId);
    }
    escolhasAtuais[grupoId] = arr;
  }
  renderizarModalProduto();
}

function alterarQtd(delta){
  qtdAtual = Math.max(1, qtdAtual + delta);
  renderizarModalProduto();
}

function resumoEscolhas(){
  const partes = [];
  produtoEmEdicao.grupos.forEach(g => {
    if(g.tipo === 'radio'){
      const op = g.opcoes.find(o => o.id === escolhasAtuais[g.id]);
      if(op) partes.push(op.label);
    } else {
      (escolhasAtuais[g.id]||[]).forEach(oid => {
        const op = g.opcoes.find(o => o.id === oid);
        if(op) partes.push(op.label);
      });
    }
  });
  return partes.join(', ');
}

function adicionarAoCarrinho(){
  if(!formularioCompleto()) return;
  carrinho.push({
    chaveId: produtoEmEdicao.id + '-' + Date.now(),
    nome: produtoEmEdicao.nome,
    icone: produtoEmEdicao.icone,
    fotoUrl: produtoEmEdicao.fotoUrl,
    categoria: produtoEmEdicao.categoria,
    qtd: qtdAtual,
    precoUnit: calcularPrecoUnitario(),
    resumoOpcoes: resumoEscolhas(),
  });
  fecharModalProduto();
  atualizarBarraCarrinho();
}

/* =========================================================
   BARRA E MODAL DO CARRINHO
   ========================================================= */
function totalItensCarrinho(){
  return carrinho.reduce((s,i) => s + i.qtd, 0);
}
function totalValorCarrinho(){
  return carrinho.reduce((s,i) => s + i.qtd * i.precoUnit, 0);
}

function atualizarBarraCarrinho(){
  const barra = document.getElementById('barra-carrinho');
  if(carrinho.length === 0){
    barra.classList.remove('visivel');
    return;
  }
  barra.classList.add('visivel');
  document.getElementById('conteudo-barra-carrinho').innerHTML = `
    <div class="esq">
      <div class="bolha">${totalItensCarrinho()}</div>
      <div class="texto">Ver carrinho</div>
    </div>
    <div class="valor">R$ ${totalValorCarrinho().toFixed(2).replace('.',',')}</div>
  `;
  document.getElementById('conteudo-barra-carrinho').onclick = abrirCarrinho;
}

function selecionarTipoEntrega(tipo){
  dadosEntrega.tipoEntrega = tipo;
  if(tipo === 'retirada') erroDadosEntrega = '';
  renderizarCarrinho();
}

function abrirCarrinho(){
  renderizarCarrinho();
  document.getElementById('overlay-carrinho').classList.add('aberto');
}
function fecharCarrinho(){
  document.getElementById('overlay-carrinho').classList.remove('aberto');
}

function renderizarCarrinho(){
  const modal = document.getElementById('modal-carrinho');
  if(carrinho.length === 0){
    modal.innerHTML = `
      <div class="modal-topo">
        <button class="fechar" onclick="fecharCarrinho()">✕</button>
        <h3>Seu carrinho</h3>
      </div>
      <div class="modal-corpo">
        <div class="carrinho-vazio">
          <div class="icone-vazio">🛍️</div>
          <p>Ainda não tem nada por aqui.<br>Volte ao cardápio e monte seu pedido.</p>
        </div>
      </div>
    `;
    return;
  }

  modal.innerHTML = `
    <div class="modal-topo">
      <button class="fechar" onclick="fecharCarrinho()">✕</button>
      <h3>Seu carrinho</h3>
      <p>${lojaSelecionada.nome}</p>
    </div>
    <div class="modal-corpo">
      ${carrinho.map((item, idx) => `
        <div class="item-carrinho">
          <div class="thumb-mini" style="background:${corFundoIcone(item.categoria)}">${item.fotoUrl ? `<img src="${item.fotoUrl}" alt="${item.nome}">` : item.icone}</div>
          <div class="info-item">
            <div class="nome-item">${item.nome}</div>
            <div class="opcoes-item">${item.resumoOpcoes || 'Sem complementos'}</div>
          </div>
          <div class="direita-item">
            <div class="preco-item">R$ ${(item.precoUnit * item.qtd).toFixed(2).replace('.',',')}</div>
            <div class="mini-stepper">
              <button onclick="ajustarQtdCarrinho(${idx}, -1)">${item.qtd === 1 ? '🗑' : '–'}</button>
              <div class="qtd-mini">${item.qtd}</div>
              <button onclick="ajustarQtdCarrinho(${idx}, 1)">+</button>
            </div>
          </div>
        </div>
      `).join('')}

      <div class="dados-entrega">
        <div class="campo-entrega">
          <label>Como você quer receber?</label>
          <div class="seletor-tipo-entrega">
            <div class="opcao-tipo-entrega ${dadosEntrega.tipoEntrega === 'delivery' ? 'ativa' : ''}" onclick="selecionarTipoEntrega('delivery')">🛵 Delivery</div>
            <div class="opcao-tipo-entrega ${dadosEntrega.tipoEntrega === 'retirada' ? 'ativa' : ''}" onclick="selecionarTipoEntrega('retirada')">🏪 Retirar na loja</div>
          </div>
        </div>
        <div class="campo-entrega">
          <label>Seu nome</label>
          <input type="text" id="input-nome-cliente" placeholder="Nome completo" value="${dadosEntrega.nome}" oninput="dadosEntrega.nome = this.value">
        </div>
        <div class="campo-entrega">
          <label>Seu telefone</label>
          <input type="tel" id="input-telefone-cliente" placeholder="(81) 99999-9999" value="${dadosEntrega.telefone}" oninput="dadosEntrega.telefone = this.value">
        </div>
        ${dadosEntrega.tipoEntrega === 'delivery' ? `
        <div class="campo-entrega">
          <label>Endereço de entrega</label>
          <textarea id="input-endereco-cliente" rows="2" placeholder="Rua, número, bairro, complemento" oninput="dadosEntrega.endereco = this.value">${dadosEntrega.endereco}</textarea>
        </div>
        ` : ''}
        <div class="campo-entrega">
          <label>Forma de pagamento</label>
          <select id="input-pagamento-cliente" onchange="dadosEntrega.pagamento = this.value">
            <option value="">Selecione...</option>
            <option value="Pix" ${dadosEntrega.pagamento==='Pix'?'selected':''}>Pix</option>
            <option value="Cartão de Crédito" ${dadosEntrega.pagamento==='Cartão de Crédito'?'selected':''}>Cartão de Crédito (na entrega)</option>
            <option value="Cartão de Débito" ${dadosEntrega.pagamento==='Cartão de Débito'?'selected':''}>Cartão de Débito (na entrega)</option>
            <option value="Dinheiro" ${dadosEntrega.pagamento==='Dinheiro'?'selected':''}>Dinheiro</option>
          </select>
        </div>
        ${erroDadosEntrega ? `<p class="erro-dados-entrega">${erroDadosEntrega}</p>` : ''}
      </div>

      <div class="resumo-total">
        <div class="linha-total"><span>Subtotal</span><span>R$ ${totalValorCarrinho().toFixed(2).replace('.',',')}</span></div>
        <div class="linha-total"><span>Entrega</span><span>${dadosEntrega.tipoEntrega === 'retirada' ? 'Retirada na loja (sem taxa)' : 'Combinada no WhatsApp'}</span></div>
        <div class="linha-total final"><span>Total</span><span>R$ ${totalValorCarrinho().toFixed(2).replace('.',',')}</span></div>
      </div>
      <textarea class="obs-pedido" id="obs-pedido" rows="2" placeholder="Alguma observação? (ex: sem açúcar, troco para R$100...)" oninput="dadosEntrega.observacao = this.value">${dadosEntrega.observacao}</textarea>
    </div>
    <div class="modal-rodape">
      <button class="btn-adicionar" onclick="enviarPedidoWhatsApp()">
        <span>Enviar pedido no WhatsApp</span>
        <span>›</span>
      </button>
    </div>
  `;
}

function ajustarQtdCarrinho(idx, delta){
  carrinho[idx].qtd += delta;
  if(carrinho[idx].qtd <= 0) carrinho.splice(idx,1);
  atualizarBarraCarrinho();
  renderizarCarrinho();
  if(carrinho.length === 0) fecharCarrinho();
}

function enviarPedidoWhatsApp(){
  const ehDelivery = dadosEntrega.tipoEntrega === 'delivery';
  if(!dadosEntrega.nome.trim() || !dadosEntrega.telefone.trim() || (ehDelivery && !dadosEntrega.endereco.trim()) || !dadosEntrega.pagamento){
    erroDadosEntrega = ehDelivery
      ? 'Preenche nome, telefone, endereço e forma de pagamento antes de enviar.'
      : 'Preenche nome, telefone e forma de pagamento antes de enviar.';
    renderizarCarrinho();
    const elErro = document.querySelector('.erro-dados-entrega');
    if(elErro && elErro.scrollIntoView) elErro.scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }
  erroDadosEntrega = '';

  let msg = `🔔 *Novo Pedido — Cardápio Digital*\n`;
  msg += `${lojaSelecionada.nome}\n\n`;
  msg += `${ehDelivery ? '🛵 *Delivery*' : '🏪 *Retirada na loja*'}\n\n`;
  msg += `👤 *Cliente:* ${dadosEntrega.nome.trim()}\n`;
  msg += `📞 *Telefone:* ${dadosEntrega.telefone.trim()}\n\n`;
  if(ehDelivery){
    msg += `🏠 *Endereço de Entrega:*\n${dadosEntrega.endereco.trim()}\n\n`;
  }
  msg += `🛍️ *Itens do Pedido:*\n`;
  carrinho.forEach(item => {
    msg += `• ${item.qtd}x ${item.nome}`;
    if(item.resumoOpcoes) msg += ` (${item.resumoOpcoes})`;
    msg += ` — R$ ${(item.precoUnit * item.qtd).toFixed(2).replace('.',',')}\n`;
  });
  msg += `\n💰 *Total a Pagar:* R$ ${totalValorCarrinho().toFixed(2).replace('.',',')}`;
  msg += `\n💳 *Pagamento:* ${dadosEntrega.pagamento}`;
  if(dadosEntrega.observacao.trim()) msg += `\n\n📝 *Observação:* ${dadosEntrega.observacao.trim()}`;

  const telefoneLimpo = String(lojaSelecionada.telefone).replace(/\D/g,'');
  const url = `https://wa.me/${telefoneLimpo}?text=${encodeURIComponent(msg)}`;

  const link = document.createElement('a');
  link.href = url;
  link.target = '_blank';
  link.rel = 'noopener';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

/* =========================================================
   INICIALIZAÇÃO
   ========================================================= */
function normalizarTexto(texto){
  return texto
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // remove acentos
    .toLowerCase()
    .replace(/açaí-se/gi, '')
    .replace(/[^a-z0-9]/g, ''); // remove espaços e símbolos
}

async function iniciar(){
  try{
    await carregarDadosDoSupabase();
    if(CATEGORIAS.length > 0) categoriaAtiva = CATEGORIAS[0].id;
    montarListaLojas();

    const parametros = new URLSearchParams(window.location.search);
    const slugLoja = parametros.get('loja');
    if(slugLoja){
      const alvo = normalizarTexto(slugLoja);
      const encontrada = LOJAS.find(l => normalizarTexto(l.nome).includes(alvo));
      if(encontrada && encontrada.aberta !== false){
        lojaSelecionada = encontrada;
        entrarNoCardapio();
      }
    }
  } catch(err){
    document.getElementById('lista-lojas').innerHTML = `<p style="font-size:12.5px; color:var(--alerta); text-align:center; padding:20px 0;">Não foi possível carregar o cardápio agora. Verifique sua conexão e tente novamente.</p>`;
    console.error(err);
  }
}
iniciar();
</script>
