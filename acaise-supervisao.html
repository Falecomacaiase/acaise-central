<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Açaí-se · Supervisão &amp; Franquia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#F7F1E6; --panel:#FFFFFF; --ink:#2B1B33; --muted:#8A7A87; --line:#E8DCCB;
    --purple-deep:#3B1F4E; --purple:#8B5CA8; --accent:#C23B7A;
    --green:#5C7A3D; --green-bg:#EEF2E4; --amber:#C97A1F; --amber-bg:#FBEFDD;
    --red:#B4432F; --red-bg:#F8E9E4; --naclr:#7A6B93; --nabg:#EDE7F3; --radius:16px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.01em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  #app{max-width:1080px;margin:0 auto;padding:20px 20px 80px;}
  .logo-img{height:34px;display:block;}
  .logo-img.big{height:76px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0 22px;border-bottom:1px solid var(--line);margin-bottom:26px;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
  .brand-role{font-size:15px;color:var(--purple-deep);font-weight:600;}
  .nav-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  button, select, input{font-family:'Inter',sans-serif;font-size:14px;}
  .btn{border:1px solid var(--purple-deep);background:var(--purple-deep);color:#fff;padding:9px 16px;border-radius:10px;cursor:pointer;font-weight:600;transition:transform .12s ease, opacity .12s ease;}
  .btn:hover{opacity:.9;} .btn:active{transform:scale(.98);}
  .btn.ghost{background:transparent;color:var(--purple-deep);}
  .btn.small{padding:6px 12px;font-size:13px;border-radius:8px;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  select, input[type=text], input[type=number], input[type=month], input[type=password], input[type=date], input[type=time], textarea{
    border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 12px;color:var(--ink);outline:none;width:100%;
  }
  select:focus, input:focus, textarea:focus{border-color:var(--purple);}
  .role-screen{display:flex;flex-direction:column;align-items:center;padding:36px 10px 10px;text-align:center;}
  .role-screen h1{font-size:30px;margin:18px 0 10px;color:var(--purple-deep);}
  .role-screen p.lead{color:var(--muted);max-width:520px;margin:0 0 34px;line-height:1.5;}
  .role-cards{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;width:100%;}
  .role-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:26px 22px;width:225px;text-align:left;cursor:pointer;transition:transform .15s ease, box-shadow .15s ease;}
  .role-card:hover{transform:translateY(-3px);box-shadow:0 12px 24px rgba(59,31,78,.10);}
  .role-card .icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:18px;}
  .role-card.sup .icon{background:var(--green-bg);color:var(--green);}
  .role-card.fran .icon{background:var(--red-bg);color:var(--accent);}
  .role-card.rede .icon{background:#EDE4F3;color:var(--purple-deep);}
  .role-card h3{margin:0 0 6px;font-size:17px;color:var(--purple-deep);}
  .role-card p{margin:0;font-size:12.5px;color:var(--muted);line-height:1.4;}
  .auth-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:26px 26px;max-width:400px;margin:40px auto;text-align:left;}
  .auth-card h2{text-align:center;} .auth-card .subtitle{text-align:center;}
  .auth-error{color:var(--red);font-size:13px;margin-top:8px;display:none;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;margin-bottom:20px;}
  .card h2{font-size:18px;margin:0 0 4px;color:var(--purple-deep);}
  .card .subtitle{font-size:13px;color:var(--muted);margin:0 0 18px;}
  .gauge-row{display:flex;gap:28px;align-items:center;flex-wrap:wrap;}
  .gauge-wrap{position:relative;width:160px;height:160px;flex-shrink:0;}
  .gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .gauge-score{font-family:'Fraunces',serif;font-size:34px;font-weight:600;color:var(--purple-deep);line-height:1;}
  .gauge-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;}
  .gauge-meta{flex:1;min-width:220px;}
  .status-pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:6px;}
  .status-action{font-size:12.5px;color:var(--muted);margin-bottom:8px;}
  .attn-box{border-radius:12px;padding:12px 14px;margin-top:10px;font-size:13px;}
  .attn-box.bad{background:var(--red-bg);color:var(--red);}
  .attn-box.warn{background:var(--amber-bg);color:var(--amber);}
  .attn-box ul{margin:6px 0 0;padding-left:18px;}
  .attn-ok{background:var(--green-bg);color:var(--green);border-radius:12px;padding:10px 14px;font-size:13px;}
  .group{border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden;}
  .group-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#FBF7EF;cursor:pointer;}
  .group-head h4{margin:0;font-size:14.5px;color:var(--purple-deep);font-family:'Inter',sans-serif;font-weight:700;}
  .group-head .g-score{font-size:12px;color:var(--muted);}
  .group-body{padding:4px 16px 12px;}
  .group.collapsed .group-body{display:none;}
  .chevron{transition:transform .15s ease;font-size:12px;color:var(--muted);}
  .group.collapsed .chevron{transform:rotate(-90deg);}
  .item-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);gap:8px;flex-wrap:wrap;}
  .item-row:last-child{border-bottom:none;}
  .item-label{font-size:13px;flex:1;min-width:160px;line-height:1.35;}
  .item-toggle{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;}
  .item-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 8px;font-size:11px;cursor:pointer;font-weight:600;color:var(--muted);}
  .item-btn.active-0{background:var(--red-bg);border-color:var(--red);color:var(--red);}
  .item-btn.active-1{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
  .item-btn.active-2{background:var(--green-bg);border-color:var(--green);color:var(--green);}
  .item-btn.active-na{background:var(--nabg);border-color:var(--naclr);color:var(--naclr);}
  .task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .task-item:last-child{border-bottom:none;}
  .task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;}
  .task-check.done{background:var(--green);border-color:var(--green);}
  .task-text{flex:1;font-size:14px;}
  .task-text.done{color:var(--muted);text-decoration:line-through;}
  .task-date{font-size:11px;color:var(--muted);margin-top:2px;}
  .empty-state{padding:26px 10px;text-align:center;color:var(--muted);font-size:13px;}
  .obs-item{padding:14px 0;border-bottom:1px solid var(--line);}
  .obs-item:last-child{border-bottom:none;}
  .obs-head{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;flex-wrap:wrap;gap:6px;}
  .obs-score{font-weight:700;color:var(--purple-deep);}
  .obs-text{font-size:14px;line-height:1.5;white-space:pre-wrap;}
  .obs-flags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .obs-flag{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--red-bg);color:var(--red);}
  .obs-flag.warn{background:var(--amber-bg);color:var(--amber);}
  .fin-summary{display:flex;gap:22px;margin-bottom:18px;flex-wrap:wrap;}
  .fin-metric{min-width:120px;}
  .fin-metric .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
  .fin-metric .value{font-family:'JetBrains Mono',monospace;font-size:20px;color:var(--purple-deep);font-weight:600;}
  .fin-metric .delta{font-size:12px;margin-top:2px;}
  .fin-metric .delta.up{color:var(--green);} .fin-metric .delta.down{color:var(--red);}
  .fin-table{width:100%;border-collapse:collapse;font-size:13px;}
  .fin-table th{text-align:right;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;padding:6px 8px;}
  .fin-table th:first-child, .fin-table td:first-child{text-align:left;}
  .fin-table td{text-align:right;padding:6px 8px;border-bottom:1px solid var(--line);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
  .form-grid.two{grid-template-columns:1fr 1fr;}
  @media(max-width:640px){.form-grid, .form-grid.two{grid-template-columns:1fr;}}
  textarea{min-height:70px;resize:vertical;font-family:'Inter',sans-serif;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
  .unit-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .unit-row:last-child{border-bottom:none;}
  .unit-row .u-name{font-weight:700;color:var(--purple-deep);min-width:140px;flex:1;}
  .unit-row .u-score{font-family:'JetBrains Mono',monospace;font-weight:600;min-width:50px;}
  .unit-row .u-rev{font-family:'JetBrains Mono',monospace;min-width:100px;font-size:13px;}
  .badge{padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--purple-deep);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  .switch-link{font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;}
  canvas{max-width:100%;}
  .loading-note{color:var(--muted);font-size:13px;padding:20px;text-align:center;}
  .hint{font-size:12px;color:var(--muted);margin-top:6px;}
</style>
</head>

async function sb(path, options={}){
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': options.prefer || 'return=representation',
  };
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method: options.method || 'GET',
    headers,
    body: options.body,
  });
  if(!res.ok){
    let msg = '';
    try{ msg = await res.text(); }catch(e){}
    throw new Error('Supabase '+res.status+': '+msg);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function slugify(str){
  return str.toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
}
function fmtMoney(n){ return 'R$ ' + Number(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtMoneyShort(n){ return 'R$ ' + Number(n||0).toLocaleString('pt-BR',{maximumFractionDigits:0}); }
function fmtDate(dstr){
  if(!dstr) return '';
  const d = dstr.length===10 ? new Date(dstr+'T00:00:00') : new Date(dstr);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function todayISO(){ return new Date().toISOString(); }
function todayDateStr(){ return new Date().toISOString().slice(0,10); }
function currentMonthKey(){ return new Date().toISOString().slice(0,7); }
function el(html){ const d = document.createElement('div'); d.innerHTML = html.trim(); return d.firstChild; }
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
function showLoading(msg){
  document.getElementById('app').innerHTML = `<div class="loading-note">${msg}</div>`;
}

async function loadUnitsList(){
  try{ return await sb('supervisao_units?select=slug,name&order=name.asc'); }
  catch(e){ showToast('Erro ao carregar unidades'); return []; }
}
async function loadUnitRow(slug){
  try{
    const rows = await sb('supervisao_units?slug=eq.'+encodeURIComponent(slug)+'&select=*');
    return rows && rows[0] ? rows[0] : {slug, name:slug, fran_password:null};
  }catch(e){ showToast('Erro ao carregar unidade'); return {slug, name:slug, fran_password:null}; }
}
async function loadUnitData(slug){
  try{
    const [checklist, tasks, financeRows] = await Promise.all([
      sb('supervisao_checks?unit_slug=eq.'+encodeURIComponent(slug)+'&order=created_at.asc'),
      sb('supervisao_tasks?unit_slug=eq.'+encodeURIComponent(slug)+'&order=created_at.asc'),
      sb('supervisao_finance?unit_slug=eq.'+encodeURIComponent(slug)),
    ]);
    const finance = {};
    (financeRows||[]).forEach(r=>{ finance[r.month] = {sistema:Number(r.sistema||0), ifood:Number(r.ifood||0), food99:Number(r.food99||0)}; });
    return {checklist: checklist||[], tasks: tasks||[], finance};
  }catch(e){ showToast('Erro ao carregar dados da unidade'); return {checklist:[], tasks:[], finance:{}}; }
}
async function addUnit(name){
  const slug = slugify(name);
  await sb('supervisao_units?on_conflict=slug', {method:'POST', prefer:'resolution=merge-duplicates,return=representation',
    body: JSON.stringify([{slug, name}])});
  return slug;
}

async function insertTasks(rows){

    const rows = await sb('supervisao_config?key=eq.'+encodeURIComponent(key)+'&select=value');

  }catch(e){ return null; }
}

  await sb('supervisao_config?on_conflict=key', {method:'POST', prefer:'resolution=merge-duplicates,return=representation',

function computeEntryScore(entry){
  const ids = allItemIds();
  let sum=0, count=0;
  ids.forEach(id=>{
    const v = entry.items ? entry.items[id] : undefined;
    if(v==='na' || v===undefined) return;
    sum += Number(v); count++;
  });
  return count ? (sum/(count*2))*100 : null;
}
function latestChecklist(record){ const list = record.checklist || []; return list.length ? list[list.length-1] : null; }
function classify(pct){
  if(pct===null || pct===undefined) return {label:'Sem dados', color:'var(--muted)', bg:'#F1ECE4', action:''};
  if(pct>=90) return {label:'Excelente', color:'var(--green)', bg:'var(--green-bg)', action:'Operação dentro do padrão Açaí-se. Manter e reconhecer.'};
  if(pct>=75) return {label:'Bom', color:'var(--green)', bg:'var(--green-bg)', action:'Pequenos ajustes. Plano de melhoria em 15 dias.'};
  if(pct>=60) return {label:'Regular', color:'var(--amber)', bg:'var(--amber-bg)', action:'Falhas relevantes. Plano de ação em 7 dias.'};
  return {label:'Crítico', color:'var(--red)', bg:'var(--red-bg)', action:'Fora do padrão. Reunião imediata com o franqueado.'};
}
function gaugeSVG(pct, colorVar){
  const ratio = pct===null ? 0 : Math.max(0, Math.min(1, pct/100));
  const r = 68, circ = 2*Math.PI*r; const dash = circ*ratio;
  return `<svg width="160" height="160" viewBox="0 0 160 160">
    <circle cx="80" cy="80" r="${r}" fill="none" stroke="#EFE6D8" stroke-width="13"/>
    <circle cx="80" cy="80" r="${r}" fill="none" stroke="${colorVar}" stroke-width="13" stroke-linecap="round" stroke-dasharray="${dash} ${circ}" transform="rotate(-90 80 80)"/>
  </svg>`;
}
function financeTotal(monthObj){ if(!monthObj) return 0; return Number(monthObj.sistema||0)+Number(monthObj.ifood||0)+Number(monthObj.food99||0); }

  const obsCard = el(`<div class="card"><h2>Histórico de auditorias</h2><p class="subtitle">Nada aqui é apagado — todo check fica registrado.</p><div id="sup-obs-list"></div></div>`);
  container.appendChild(obsCard);
  renderObservationsInto(obsCard.querySelector('#sup-obs-list'));
}

function renderFinanceTableHTML(){
  const fin = STATE.record.finance || {};
  const months = Object.keys(fin).sort();
  if(!months.length) return `<div class="empty-state">Nenhum faturamento lançado ainda.</div>`;
  const rows = months.slice().reverse().map(m=>{
    const label = new Date(m+'-01T00:00:00').toLocaleDateString('pt-BR',{month:'short', year:'numeric'});
    const d = fin[m];
    return `<tr><td style="text-transform:capitalize;">${label}</td><td class="mono">${fmtMoneyShort(d.sistema)}</td><td class="mono">${fmtMoneyShort(d.ifood)}</td><td class="mono">${fmtMoneyShort(d.food99)}</td><td class="mono"><b>${fmtMoneyShort(financeTotal(d))}</b></td></tr>`;
  }).join('');
  return `<table class="fin-table"><thead><tr><th>Mês</th><th>Sistema</th><th>iFood</th><th>99Food</th><th>Total</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderObservationsInto(wrap){
  const list = (STATE.record.checklist || []).slice().reverse();
  if(!list.length){ wrap.appendChild(el(`<div class="empty-state">Nenhuma auditoria registrada ainda.</div>`)); return; }
  list.forEach(entry=>{
    const pct = computeEntryScore(entry);
    const dateLabel = fmtDate(entry.visit_date || entry.created_at);
    const item = el(`
      <div class="obs-item">
        <div class="obs-head">
          <span>${dateLabel}${entry.supervisor_name ? ' · '+entry.supervisor_name : ''}</span>
          <span class="obs-score">${pct!==null ? pct.toFixed(0)+'%' : '—'}</span>
        </div>
        <div class="obs-text">${entry.observation ? entry.observation.replace(/</g,'&lt;') : '(sem observação escrita)'}</div>
        <div class="obs-flags"></div>
      </div>
    `);
    const flagsWrap = item.querySelector('.obs-flags');
    if(entry.missing_products) flagsWrap.appendChild(el(`<span class="obs-flag">Falta: ${entry.missing_products}</span>`));
    if(entry.negative_reviews) flagsWrap.appendChild(el(`<span class="obs-flag warn">Avaliações neg.: ${entry.negative_reviews}</span>`));
    CHECK_GROUPS.forEach(g=>{
      g.items.forEach((label, idx)=>{
        if(entry.items && entry.items[g.key+'__'+idx]===0) flagsWrap.appendChild(el(`<span class="obs-flag">${label}</span>`));
      });
    });
    wrap.appendChild(item);
  });
}
/* ================= FRANQUEADO VIEW ================= */
function renderFranqueadoView(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(el(topbarHTML('Franqueado · ' + currentUnitName())));
  bindTopbarNav();
  const container = el(`<div></div>`);
  app.appendChild(container);

  const checklist = STATE.record.checklist || [];
  const last = checklist.length ? checklist[checklist.length-1] : null;
  const pct = last ? computeEntryScore(last) : null;
  const status = classify(pct);

  const gaugeCard = el(`
    <div class="card">
      <h2>Sua loja agora</h2>
      <p class="subtitle">${last ? 'Última auditoria em '+fmtDate(last.visit_date||last.created_at) : 'Ainda não há auditorias registradas'}</p>
      <div class="gauge-row">
        <div class="gauge-wrap">${gaugeSVG(pct, status.color)}
          <div class="gauge-center"><div class="gauge-score">${pct!==null ? pct.toFixed(0)+'%':'–'}</div><div class="gauge-label">conformidade</div></div>
        </div>
        <div class="gauge-meta">
          <span class="status-pill" style="background:${status.bg};color:${status.color};">${status.label}</span>
          ${status.action ? `<div class="status-action">${status.action}</div>` : ''}
          <div id="attn-wrap"></div>
        </div>
      </div>
    </div>
  `);
  container.appendChild(gaugeCard);

  if(last){
    const attnWrap = gaugeCard.querySelector('#attn-wrap');
    const nonConforme = [], parcial = [];
    CHECK_GROUPS.forEach(g=>g.items.forEach((label, idx)=>{
      const v = last.items ? last.items[g.key+'__'+idx] : undefined;
      if(v===0) nonConforme.push(label); else if(v===1) parcial.push(label);
    }));
    if(last.missing_products) attnWrap.appendChild(el(`<div class="attn-box bad"><b>Produtos em falta:</b> ${last.missing_products}</div>`));
    if(last.negative_reviews) attnWrap.appendChild(el(`<div class="attn-box warn"><b>Avaliações negativas:</b> ${last.negative_reviews}</div>`));
    if(nonConforme.length) attnWrap.appendChild(el(`<div class="attn-box bad"><b>Fora do padrão — corrigir com prioridade:</b><ul>${nonConforme.map(x=>'<li>'+x+'</li>').join('')}</ul></div>`));
    if(parcial.length) attnWrap.appendChild(el(`<div class="attn-box warn"><b>Parcialmente conforme:</b><ul>${parcial.map(x=>'<li>'+x+'</li>').join('')}</ul></div>`));
    if(!nonConforme.length && !parcial.length) attnWrap.appendChild(el(`<div class="attn-ok">Todos os itens auditados estão dentro do padrão. 🎉</div>`));
  }

  const trendCard = el(`<div class="card"><h2>Evolução da conformidade</h2><p class="subtitle">% em cada auditoria</p><canvas id="trend-chart" height="90"></canvas></div>`);
  container.appendChild(trendCard);

  const tasks = STATE.record.tasks || [];
  const pending = tasks.filter(t=>t.status==='pending');
  const done = tasks.filter(t=>t.status==='done');
  const tasksCard = el(`<div class="card"><h2>Tarefas pendentes</h2><p class="subtitle">${pending.length} pendente(s) · marque como feita quando resolver</p><div id="fran-tasks-list"></div></div>`);
  container.appendChild(tasksCard);
  const listWrap = tasksCard.querySelector('#fran-tasks-list');
  if(!tasks.length){ listWrap.appendChild(el(`<div class="empty-state">Nenhuma tarefa por aqui.</div>`)); }
  else{
    [...pending, ...done].forEach(t=>{
      const row = el(`
        <div class="task-item">
          <div class="task-check ${t.status==='done'?'done':''}" data-id="${t.id}">${t.status==='done'?'✓':''}</div>
          <div><div class="task-text ${t.status==='done'?'done':''}">${t.text}</div>
          <div class="task-date">criada em ${fmtDate(t.created_at)}${t.completed_at ? ' · concluída em '+fmtDate(t.completed_at):''}</div></div>
        </div>
      `);
      row.querySelector('.task-check').onclick = async (e)=>{
        const id = e.currentTarget.getAttribute('data-id');
        const task = STATE.record.tasks.find(x=>x.id===id);
        const newStatus = task.status==='done' ? 'pending' : 'done';
        try{
          await patchTask(id, {status:newStatus, completed_at: newStatus==='done' ? todayISO() : null});
          task.status = newStatus;
          task.completed_at = newStatus==='done' ? todayISO() : null;
          showToast(newStatus==='done' ? 'Tarefa concluída' : 'Tarefa reaberta');
          renderFranqueadoView();
        }catch(err){ showToast('Falha ao atualizar tarefa'); }
      };
      listWrap.appendChild(row);
    });
  }

  const fin = STATE.record.finance || {};
  const months = Object.keys(fin).sort();
  let deltaHTML = '';
  if(months.length>=2){
    const lastTotal = financeTotal(fin[months[months.length-1]]);
    const prevTotal = financeTotal(fin[months[months.length-2]]);
    const diff = prevTotal ? ((lastTotal-prevTotal)/prevTotal*100) : 0;
    deltaHTML = `<div class="delta ${diff>=0?'up':'down'}">${diff>=0?'▲':'▼'} ${Math.abs(diff).toFixed(1)}% vs mês anterior</div>`;
  }
  const financeCard = el(`
    <div class="card">
      <h2>Faturamento</h2><p class="subtitle">Sistema (loja) + iFood + 99Food, mês a mês</p>
      <div class="fin-summary"><div class="fin-metric"><div class="label">Total último mês</div>
        <div class="value">${months.length ? fmtMoney(financeTotal(fin[months[months.length-1]])) : '–'}</div>${deltaHTML}</div></div>
      <canvas id="finance-chart" height="100"></canvas>
    </div>
  `);
  container.appendChild(financeCard);

  const obsCard = el(`<div class="card"><h2>Observações da supervisão</h2><div id="fran-obs-list"></div></div>`);
  container.appendChild(obsCard);
  renderObservationsInto(obsCard.querySelector('#fran-obs-list'));

  requestAnimationFrame(()=>{
    if(checklist.length){
      new Chart(trendCard.querySelector('#trend-chart'), {
        type:'line',
        data:{ labels: checklist.map(e=>fmtDate(e.visit_date||e.created_at)),
          datasets:[{label:'% conformidade', data: checklist.map(e=>computeEntryScore(e)),
            borderColor:'#8B5CA8', backgroundColor:'rgba(139,92,168,0.14)', fill:true, tension:.3, pointRadius:4, pointBackgroundColor:'#3B1F4E'}] },
        options:{ plugins:{legend:{display:false}}, scales:{y:{min:0,max:100,ticks:{stepSize:20}}} }
      });
    } else { trendCard.querySelector('#trend-chart').replaceWith(el('<div class="empty-state">Sem histórico ainda.</div>')); }

    if(months.length){
      new Chart(financeCard.querySelector('#finance-chart'), {
        type:'bar',
        data:{ labels: months.map(m=>new Date(m+'-01T00:00:00').toLocaleDateString('pt-BR',{month:'short',year:'2-digit'})),
          datasets:[
            {label:'Sistema', data: months.map(m=>fin[m].sistema||0), backgroundColor:'#3B1F4E'},
            {label:'iFood', data: months.map(m=>fin[m].ifood||0), backgroundColor:'#C23B7A'},
            {label:'99Food', data: months.map(m=>fin[m].food99||0), backgroundColor:'#C97A1F'},
          ]},
        options:{ plugins:{legend:{position:'bottom'}}, scales:{ x:{stacked:true}, y:{stacked:true, ticks:{callback:(v)=>'R$ '+v.toLocaleString('pt-BR')}} } }
      });
    } else { financeCard.querySelector('#finance-chart').replaceWith(el('<div class="empty-state">Sem faturamento lançado ainda.</div>')); }
  });
}

/* ================= NETWORK (REDE) VIEW ================= */
async function renderNetworkView(){
  const app = document.getElementById('app');
  app.innerHTML = `<div class="topbar">${brandBlock('Franqueadora · Visão da Rede')}<span class="switch-link" id="back-role">trocar de perfil</span></div><div class="loading-note">Carregando dados de todas as unidades…</div>`;
  document.getElementById('back-role').onclick = renderRoleScreen;

  STATE.units = await loadUnitsList();
  const records = [];
  for(const u of STATE.units){ records.push({unit:u, record: await loadUnitData(u.slug)}); }

  const thisMonth = currentMonthKey();
  const rows = records.map(({unit, record})=>{
    const last = latestChecklist(record);
    const score = last ? computeEntryScore(last) : null;
    const tasks = record.tasks || [];
    const pending = tasks.filter(t=>t.status==='pending').length;
    const monthData = (record.finance||{})[thisMonth];
    return {
      unit, score, lastDate: last ? (last.visit_date||last.created_at) : null, pending,
      monthTotal: monthData ? financeTotal(monthData) : 0, monthData,
      negFlag: last && last.negative_reviews ? last.negative_reviews : '',
      missingFlag: last && last.missing_products ? last.missing_products : '',
    };
  }).sort((a,b)=>{
    if(a.score===null && b.score===null) return 0;
    if(a.score===null) return -1; if(b.score===null) return 1;
    return a.score - b.score;
  });

  const networkTotalRevenue = rows.reduce((s,r)=>s+r.monthTotal,0);
  const scoredRows = rows.filter(r=>r.score!==null);
  const networkAvgScore = scoredRows.length ? scoredRows.reduce((s,r)=>s+r.score,0)/scoredRows.length : null;
  const totalPending = rows.reduce((s,r)=>s+r.pending,0);
  const flaggedUnits = rows.filter(r=>r.negFlag || r.missingFlag || (r.score!==null && r.score<75));

  app.innerHTML = '';
  app.appendChild(el(`<div class="topbar">${brandBlock('Franqueadora · Visão da Rede')}<span class="switch-link" id="back-role">trocar de perfil</span></div>`));
  document.getElementById('back-role').onclick = renderRoleScreen;

  const container = el(`<div></div>`);
  app.appendChild(container);

  container.appendChild(el(`
    <div class="card">
      <h2>Resumo da rede — ${STATE.units.length} unidade(s)</h2>
      <div class="fin-summary">
        <div class="fin-metric"><div class="label">Faturamento do mês (rede)</div><div class="value">${fmtMoney(networkTotalRevenue)}</div></div>
        <div class="fin-metric"><div class="label">Conformidade média da rede</div><div class="value">${networkAvgScore!==null ? networkAvgScore.toFixed(0)+'%' : '–'}</div></div>
        <div class="fin-metric"><div class="label">Tarefas pendentes (rede)</div><div class="value">${totalPending}</div></div>
        <div class="fin-metric"><div class="label">Unidades pedindo atenção</div><div class="value">${flaggedUnits.length}</div></div>
      </div>
    </div>
  `));

  const rankCard = el(`<div class="card"><h2>Ranking por conformidade (piores primeiro)</h2><p class="subtitle">Onde a franqueadora precisa colocar energia agora</p><div id="unit-rank-list"></div></div>`);
  container.appendChild(rankCard);
  const rankList = rankCard.querySelector('#unit-rank-list');
  if(!rows.length){ rankList.appendChild(el(`<div class="empty-state">Nenhuma unidade cadastrada ainda.</div>`)); }
  else{
    rows.forEach(r=>{
      const status = classify(r.score);
      const row = el(`
        <div class="unit-row">
          <div class="u-name">${r.unit.name}</div>
          <span class="badge" style="background:${status.bg};color:${status.color};">${status.label}</span>
          <div class="u-score">${r.score!==null ? r.score.toFixed(0)+'%' : '–'}</div>
          <div class="u-rev">${fmtMoneyShort(r.monthTotal)}/mês</div>
          <div style="font-size:12px;color:var(--muted);">${r.pending} pendente(s)${r.lastDate ? ' · última visita '+fmtDate(r.lastDate) : ''}</div>
        </div>
      `);
      if(r.negFlag) row.appendChild(el(`<span class="obs-flag warn" style="margin-left:auto;">Aval. neg.: ${r.negFlag}</span>`));
      if(r.missingFlag) row.appendChild(el(`<span class="obs-flag">Falta: ${r.missingFlag}</span>`));
      rankList.appendChild(row);
    });
  }

  container.appendChild(el(`<div class="card"><h2>Conformidade por unidade</h2><canvas id="score-chart" height="100"></canvas></div>`));
  container.appendChild(el(`<div class="card"><h2>Faturamento por unidade (mês atual)</h2><p class="subtitle">Sistema, iFood e 99Food empilhados</p><canvas id="rev-chart" height="100"></canvas></div>`));

  requestAnimationFrame(()=>{
    if(!rows.length) return;
    new Chart(document.getElementById('score-chart'), {
      type:'bar',
      data:{ labels: rows.map(r=>r.unit.name),
        datasets:[{ label:'% conformidade', data: rows.map(r=>r.score!==null ? Number(r.score.toFixed(0)) : 0),
          backgroundColor: rows.map(r=>{ if(r.score===null) return '#C9BEC2'; const s=classify(r.score);
            return s.label==='Crítico' ? '#B4432F' : s.label==='Regular' ? '#C97A1F' : '#5C7A3D'; }),
          borderRadius:6 }] },
      options:{ plugins:{legend:{display:false}}, scales:{y:{min:0,max:100}} }
    });
    new Chart(document.getElementById('rev-chart'), {
      type:'bar',
      data:{ labels: rows.map(r=>r.unit.name),
        datasets:[
          {label:'Sistema', data: rows.map(r=>r.monthData ? (r.monthData.sistema||0):0), backgroundColor:'#3B1F4E'},
          {label:'iFood', data: rows.map(r=>r.monthData ? (r.monthData.ifood||0):0), backgroundColor:'#C23B7A'},
          {label:'99Food', data: rows.map(r=>r.monthData ? (r.monthData.food99||0):0), backgroundColor:'#C97A1F'},
        ]},
      options:{ plugins:{legend:{position:'bottom'}}, scales:{ x:{stacked:true}, y:{stacked:true, ticks:{callback:(v)=>'R$ '+v.toLocaleString('pt-BR')}} } }
    });
  });
}

init();
</script>
